version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: orders
        description: "Raw orders loaded as-is from the source system by the Airflow extract task."

models:
  - name: stg_orders
    description: "Cleaned, typed staging view over raw.orders."
    columns:
      - name: order_id
        description: "Primary key of the orders table."
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: fct_daily_sales
    description: "Daily sales aggregated by region and product category, used for BI reporting."
    columns:
      - name: order_date
        tests:
          - not_null
      - name: revenue
        tests:
          - not_null
